services:
  - type: web
    name: market-price-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Market Price Forecasting API
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.vercel.app
      - key: DATABASE_URL
        sync: false

